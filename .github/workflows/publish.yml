name: Build and Publish Releases

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Public App (Electron)
        run: npm run build:pc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Admin App (Electron)
        run: npm run build:admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Android OTA Zip
        run: |
          mkdir out-android
          powershell Compress-Archive -Path www\* -DestinationPath out-android/www.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist-public-v2/*.exe
            dist-public-v2/*.yml
            dist-admin-v2/*.exe
            dist-admin-v2/*.yml
            out-android/www.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
