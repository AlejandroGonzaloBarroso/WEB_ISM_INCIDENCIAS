name: Build and Publish Releases

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm install
      - name: Build Windows Public
        run: npm run build:pc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Windows Admin
        run: npm run build:admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Windows Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist-public-v2/*.exe
            dist-public-v2/latest.yml
            dist-admin-v2/*.exe
            dist-admin-v2/admin.yml
          draft: false
          prerelease: false

  build-mac-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm install
      - name: Build Mac Public
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Mac Admin
        run: npm run build:admin:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build iOS App (Unsigned)
        run: |
          npm install @capacitor/ios@8.2.0
          npx cap add ios
          npx cap sync ios
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release SYMROOT="$(PWD)/build" CODE_SIGNING_ALLOWED="NO" CODE_SIGNING_REQUIRED="NO" CODE_SIGN_IDENTITY="" -destination "generic/platform=iOS" clean build || true
          if [ -d "build/Release-iphoneos/App.app" ]; then
            cd build/Release-iphoneos
            mkdir -p Payload
            mv App.app Payload/
            zip -r ios-unsigned.ipa Payload
            mv ios-unsigned.ipa ../../../
          else
            echo "iOS build failed or generated unexpected output structure"
          fi
      - name: Upload Mac and iOS Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist-public-v2/*.dmg
            dist-public-v2/*mac.yml
            dist-public-v2/*mac.zip
            dist-admin-v2/*.dmg
            dist-admin-v2/*mac.yml
            dist-admin-v2/*mac.zip
            ios-unsigned.ipa
          draft: false
          prerelease: false

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'
      - run: npm install
      - name: Build Android APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Prepare Android OTA Zip
        run: |
          mkdir out-android
          sudo apt-get install zip -y
          cd www
          zip -r ../out-android/www.zip ./*
          cd ..
      - name: Upload Android APK and OTA
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            out-android/www.zip
          draft: false
          prerelease: false
